# SonarQube project configuration
sonar.projectKey=robot-controller-api
sonar.projectName=Robot Controller API
sonar.projectVersion=1.0

# Source directories
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=cs

# Exclusions
sonar.exclusions=**/obj/**,**/bin/**,**/Migrations/**

# Coverage report paths (generated by dotnet test)
sonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml

# Duplication exclusions
sonar.cpd.exclusions=**/Models/**

# Quality Gate thresholds (configured in SonarQube UI)
# Recommended gates for this project:
#   - Coverage > 60%
#   - Duplicated Lines < 5%
#   - Maintainability Rating: A
#   - Reliability Rating: A
#   - Security Rating: A