version: "3.9"

services:

  # ── PostgreSQL database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: robot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sit331
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: prime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Robot Controller API ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: robot_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_CONNECTION_STRING: "Host=postgres;Database=sit331;Username=postgres;Password=prime"
      ASPNETCORE_ENVIRONMENT: Staging
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ── Prometheus metrics ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: robot_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  # ── Grafana dashboards ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: robot_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data: