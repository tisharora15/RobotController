global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Alert rules (optional)
rule_files: []

scrape_configs:

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape the Robot Controller API /metrics endpoint
  - job_name: "robot_controller_api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
    scrape_interval: 10s